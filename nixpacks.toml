# nixpacks.toml
# Controla as fases do build no Railway/Nixpacks
#
# Problema: o BuildKit mantém um cache de node_modules entre builds.
# Quando o cache contém um node_modules corrompido/incompleto de builds
# anteriores, o 'npm install' retorna 'up to date' sem reinstalar nada,
# causando MODULE_NOT_FOUND para node_modules/prisma/build/index.js.
#
# Solução:
# 1. Desabilitar a fase install automática do Nixpacks (evita npm ci problemático)
# 2. No build, remover node_modules antes de instalar (garante fresh install)

[phases.install]
cmds = []

[phases.build]
cmds = [
  "rm -rf node_modules",
  "npm install --legacy-peer-deps",
  "node node_modules/prisma/build/index.js generate",
  "npm run build",
  "cp -r .next/static .next/standalone/.next/static",
  "cp -r public .next/standalone/public"
]
