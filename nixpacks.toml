# nixpacks.toml
# Controla as fases do build no Railway/Nixpacks
#
# Problema: o BuildKit monta /app/node_modules/.cache como volume de cache
# separado (Device or resource busy). Isso impede 'rm -rf node_modules'.
# Mas o npm install retorna 'up to date' reutilizando cache corrompido.
#
# Solução: usar 'find' para remover tudo em node_modules EXCETO .cache
# (que é um mount point do BuildKit e não pode ser removido).

[phases.install]
cmds = []

[phases.build]
cmds = [
  "find node_modules -mindepth 1 -maxdepth 1 ! -name '.cache' -exec rm -rf {} +",
  "npm install --legacy-peer-deps",
  "node node_modules/prisma/build/index.js generate",
  "npm run build",
  "cp -r .next/static .next/standalone/.next/static",
  "cp -r public .next/standalone/public"
]
